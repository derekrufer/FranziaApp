services:
  postgres:
    image: postgres:16-alpine
    container_name: fantasy-draft-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-draft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-fantasy_draft}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fantasy-draft-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fantasy-draft-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8088}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - fantasy-draft-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: fantasy-draft-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8088}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fantasy-draft-network

networks:
  fantasy-draft-network:
    name: fantasy-draft-network

volumes:
  postgres-data:
    name: fantasy-draft-postgres-data
